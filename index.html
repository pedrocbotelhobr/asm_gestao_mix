<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Mix — Oportunidades de Cadastro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0f2240;--blue:#1a5276;--accent:#e67e22;
  --green:#27ae60;--red:#c0392b;--gold:#e67e00;
  --bg:#f0f3f8;--card:#fff;--text:#1a1a2e;--muted:#7f8c8d;--border:#dce3ec;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.hdr{background:var(--navy);padding:14px 16px 12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.hdr h1{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#fff}
.hdr p{font-size:11px;color:#8eafd4;margin-top:1px}
.back-btn{background:rgba(255,255,255,.12);border:none;color:#fff;padding:5px 10px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;margin-bottom:8px;display:none;font-family:'DM Sans',sans-serif}
.back-btn.vis{display:inline-block}

/* SELECTS */
.sels{padding:12px 16px;background:var(--navy);display:flex;flex-direction:column;gap:9px;border-bottom:3px solid var(--accent)}
.sw label{font-size:10px;font-weight:600;color:#8eafd4;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px}
.sw{position:relative}
select{width:100%;padding:10px 34px 10px 12px;border-radius:10px;border:1.5px solid #2c4a6e;background:#162d4a;color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;appearance:none;-webkit-appearance:none;outline:none;cursor:pointer}
select:focus{border-color:var(--accent)}
select option{background:#162d4a}
.arr{position:absolute;right:11px;bottom:11px;color:#8eafd4;font-size:10px;pointer-events:none}

/* CONTENT */
.wrap{padding:14px 16px;max-width:560px;margin:0 auto}

/* VENDOR SUMMARY */
.vsumhdr{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--navy);margin-bottom:12px}
.vkpis{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px}
.kpi{background:var(--card);border-radius:12px;padding:13px 14px;box-shadow:0 1px 6px rgba(0,0,0,.07)}
.kpi .n{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--navy);line-height:1}
.kpi .l{font-size:11px;color:var(--muted);font-weight:600;margin-top:4px;text-transform:uppercase;letter-spacing:.4px}
.kpi.r .n{color:var(--red)} .kpi.g .n{color:var(--green)} .kpi.o .n{color:var(--gold)}

/* CLIENT TABLE */
.ctitle{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin:16px 0 9px;display:flex;align-items:center;gap:8px}
.ctitle::after{content:'';flex:1;height:1px;background:var(--border)}
.ctbl{width:100%;border-collapse:collapse;background:var(--card);border-radius:12px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.ctbl th{background:var(--navy);color:#fff;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;padding:9px 8px;text-align:center;letter-spacing:.5px}
.ctbl th:first-child{text-align:left;padding-left:12px}
.ctbl td{padding:9px 8px;font-size:12px;border-bottom:1px solid var(--border);text-align:center;vertical-align:middle}
.ctbl td:first-child{text-align:left;padding-left:12px;font-weight:600;max-width:160px}
.ctbl tr:last-child td{border-bottom:none}
.ctbl tr:nth-child(even) td{background:#f7f9fc}
.ctbl tr:hover td{background:#eef4fb;cursor:pointer}
.cnt{display:inline-block;border-radius:5px;padding:2px 6px;font-size:11px;font-weight:700;min-width:22px;text-align:center}
.cnt.r{background:#fdecea;color:var(--red)}
.cnt.o{background:#fef5e4;color:var(--gold)}
.cnt.g{background:#eafaf1;color:var(--green)}
.cnt.gr{background:#f4f6f9;color:#95a5a6}
.cnt.done{background:#eafaf1;color:var(--green)}
.prog-cell{font-size:11px;font-weight:600}

/* CLIENT VIEW */
.clichdr{background:var(--card);border-radius:14px;padding:14px;margin-bottom:13px;box-shadow:0 2px 10px rgba(0,0,0,.07);border-left:4px solid var(--accent)}
.clichdr h2{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--navy);line-height:1.3}
.climeta{display:flex;gap:9px;margin-top:9px;flex-wrap:wrap}
.mb{background:var(--bg);border-radius:7px;padding:5px 9px;font-size:11px;font-weight:600;color:var(--muted)}
.mb span{color:var(--text);font-size:12px}

/* SUMMARY PILLS */
.spills{display:flex;gap:8px;margin-bottom:13px}
.sp{flex:1;background:var(--card);border-radius:10px;padding:10px 6px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.sp .n{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;color:var(--navy);display:block}
.sp .l{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.sp.r .n{color:var(--red)} .sp.g .n{color:var(--green)} .sp.o .n{color:var(--gold)}

/* PROGRESS */
.pgwrap{margin-bottom:13px}
.pglbl{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);font-weight:600;margin-bottom:4px}
.pgbar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.pgfill{height:100%;background:linear-gradient(90deg,var(--green),var(--accent));border-radius:3px;transition:width .4s}

/* FILTER TABS */
.tabs{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.tab{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;border:1.5px solid var(--border);background:var(--card);color:var(--muted);flex-shrink:0;transition:all .15s}
.tab.act{background:var(--navy);color:#fff;border-color:var(--navy)}

/* SECTION TITLE */
.stl{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin:15px 0 9px;display:flex;align-items:center;gap:8px}
.stl::after{content:'';flex:1;height:1px;background:var(--border)}

/* LEGEND */
.leg{background:var(--card);border-radius:11px;padding:12px;margin-bottom:13px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.ltl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px}
.litems{display:flex;flex-wrap:wrap;gap:8px}
.li{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500}
.ld{width:9px;height:9px;border-radius:3px;flex-shrink:0}

/* GAP CARDS */
.glist{display:flex;flex-direction:column;gap:8px}
.gc{background:var(--card);border-radius:11px;padding:12px;box-shadow:0 1px 5px rgba(0,0,0,.06);display:flex;align-items:flex-start;gap:10px;border-left:4px solid transparent;transition:transform .12s,opacity .2s}
.gc:active{transform:scale(.98)}
.gc.p1{border-left-color:var(--red)} .gc.p2{border-left-color:var(--gold)}
.gc.p3{border-left-color:var(--green)} .gc.p4{border-left-color:#bdc3c7}
.gc.done-c{opacity:.4} .gc.na-c{opacity:.28;filter:grayscale(.8)}
.rb{min-width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:12px;font-weight:800;flex-shrink:0}
.p1 .rb{background:#fdecea;color:var(--red)} .p2 .rb{background:#fef5e4;color:var(--gold)}
.p3 .rb{background:#eafaf1;color:var(--green)} .p4 .rb{background:#f4f6f9;color:#95a5a6}
.gi{flex:1;min-width:0}
.gn{font-size:13px;font-weight:600;color:var(--text);line-height:1.3}
.gcat{font-size:11px;color:var(--muted);margin-top:2px}
.gst{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.pill{background:var(--bg);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:600;color:var(--muted)}
.pill strong{color:var(--text)}
.abns{display:flex;flex-direction:column;gap:4px;flex-shrink:0;align-self:center}
.ab{border:none;border-radius:7px;padding:7px 9px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;cursor:pointer;letter-spacing:.3px;transition:background .15s;white-space:nowrap;min-width:52px;text-align:center}
.ab.add{background:var(--navy);color:#fff}
.ab.add:active{background:var(--accent)}
.ab.add.act{background:var(--green)}
.ab.na{background:#f0f3f8;color:var(--muted);border:1px solid var(--border)}
.ab.na.act{background:#fdecea;color:var(--red);border-color:#f5c6c6}

/* PLACEHOLDER */
.ph{text-align:center;padding:50px 20px;color:var(--muted)}
.ph .ico{font-size:42px;margin-bottom:12px}
.ph h3{font-family:'Syne',sans-serif;font-size:14px;color:var(--text);margin-bottom:6px}
.ph p{font-size:12px;line-height:1.5}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.3);opacity:0;transition:opacity .3s;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="hdr">
  <button class="back-btn" id="backBtn" onclick="goBack()">← Voltar</button>
  <h1 id="hdrTitle">🎯 Oportunidades de Mix</h1>

</div>

</div>

let state = {};
try{ state = JSON.parse(localStorage.getItem('mixState2')||'{}'); }catch(e){}

let curV='', curC='', curFilter='all';

function save(){ try{ localStorage.setItem('mixState2', JSON.stringify(state)); }catch(e){} }
function K(v,c){ return v+'||'+c; }
function fmtR(v){ return 'R$ '+Math.round(v).toLocaleString('pt-BR'); }
function pClass(r){ return r<=10?'p1':r<=25?'p2':r<=50?'p3':'p4'; }
function pLabel(r){ return r<=10?'🔴 Top 10':r<=25?'🟡 Top 25':r<=50?'🟢 Top 50':'⚪ Top 80'; }

window.onload = function(){
  const sel = document.getElementById('selV');
  Object.keys(D).sort().forEach(v=>{
    const o = document.createElement('option');
    o.value=v; o.textContent=v; sel.appendChild(o);
  });
};

function onVendedor(){
  curV = document.getElementById('selV').value;
  curC = '';
  curFilter = 'all';
  document.getElementById('selCwrap').style.display = curV ? 'block' : 'none';
  document.getElementById('backBtn').classList.remove('vis');
  document.getElementById('hdrTitle').textContent = curV ? curV + ' — Carteira' : '🎯 Oportunidades de Mix';
  document.getElementById('hdrSub').textContent = curV ? 'Selecione o cliente para detalhar' : 'Selecione o vendedor para começar';

  if(!curV){
    document.getElementById('main').innerHTML = '<div class="ph"><div class="ico">📦</div><h3>Bem-vindo!</h3><p>Selecione o vendedor para ver o resumo da carteira.</p></div>';
    return;
  }

  // Populate client select
  const selC = document.getElementById('selC');
  selC.innerHTML = '<option value="">— Selecione o cliente —</option>';
  const clis = D[curV];
  const sorted = Object.entries(clis).sort((a,b)=>b[1].f - a[1].f);
  sorted.forEach(([c, info])=>{
    const open = info.g.filter(g=>!(state[K(curV,c)]||{})[g.r]).length;
    const o = document.createElement('option');
    o.value = c;
    o.textContent = c + ' (' + open + ')';
    selC.appendChild(o);
  });

  renderVendor();
}

function onCliente(){
  curC = document.getElementById('selC').value;
  if(!curC){ renderVendor(); return; }
  curFilter = 'all';
  document.getElementById('backBtn').classList.add('vis');
  document.getElementById('hdrTitle').textContent = '🎯 ' + curC;
  document.getElementById('hdrSub').textContent = curV;
  renderCliente();
}

function goBack(){
  curC = '';
  curFilter = 'all';
  document.getElementById('selC').value = '';
  document.getElementById('backBtn').classList.remove('vis');
  document.getElementById('hdrTitle').textContent = curV + ' — Carteira';
  document.getElementById('hdrSub').textContent = 'Selecione o cliente para detalhar';
  renderVendor();
}

function setFilter(f){ curFilter=f; renderCliente(); }

// ── VENDOR SUMMARY ────────────────────────────────────────────────────────────
function renderVendor(){
  const clis = D[curV];
  const entries = Object.entries(clis).sort((a,b)=>b[1].f - a[1].f);

  let totalOpen=0, totalAdd=0, totalNa=0, cliCrit=0;
  entries.forEach(([c, info])=>{
    const st = state[K(curV,c)] || {};
    info.g.forEach(g=>{
      if(st[g.r]==='add') totalAdd++;
      else if(st[g.r]==='na') totalNa++;
      else totalOpen++;
    });
    const critOpen = info.g.filter(g=>g.r<=10 && !st[g.r]).length;
    if(critOpen>0) cliCrit++;
  });
  const totalGaps = totalOpen+totalAdd+totalNa;
  const pct = totalGaps>0 ? Math.round((totalAdd+totalNa)/totalGaps*100) : 0;

  let h = '';
  h += `<div class="vsumhdr">Carteira de ${curV}</div>`;

  // KPIs
  h += `<div class="vkpis">
    <div class="kpi"><div class="n">${entries.length}</div><div class="l">Clientes</div></div>
    <div class="kpi r"><div class="n">${cliCrit}</div><div class="l">Clientes c/ gap Top 10</div></div>
    <div class="kpi o"><div class="n">${totalOpen}</div><div class="l">Oportunidades abertas</div></div>
    <div class="kpi g"><div class="n">${totalAdd}</div><div class="l">Itens ativados</div></div>
  </div>`;

  // Progress
  h += `<div class="pgwrap">
    <div class="pglbl"><span>Progresso geral da carteira</span><span>${totalAdd+totalNa} / ${totalGaps} tratados (${pct}%)</span></div>
    <div class="pgbar"><div class="pgfill" style="width:${pct}%"></div></div>
  </div>`;

  // Client table
  h += `<div class="ctitle">Clientes — oportunidades por prioridade</div>`;
  h += `<div style="overflow-x:auto"><table class="ctbl">
    <thead><tr>
      <th>CLIENTE</th>
      <th>FAT 6M</th>
      <th>🔴 T10</th>
      <th>🟡 T25</th>
      <th>🟢 T50</th>
      <th>⚪ T80</th>
      <th>✅ ADD</th>
      <th>ABERTOS</th>
    </tr></thead><tbody>`;

  entries.forEach(([c, info])=>{
    const st = state[K(curV,c)] || {};
    const t10 = info.g.filter(g=>g.r<=10&&!st[g.r]).length;
    const t25 = info.g.filter(g=>g.r>10&&g.r<=25&&!st[g.r]).length;
    const t50 = info.g.filter(g=>g.r>25&&g.r<=50&&!st[g.r]).length;
    const t80 = info.g.filter(g=>g.r>50&&!st[g.r]).length;
    const add = info.g.filter(g=>st[g.r]==='add').length;
    const open= info.g.filter(g=>!st[g.r]).length;
    const cname = c.length>22 ? c.substring(0,21)+'…' : c;
    h += `<tr onclick="selectClient('${c.replace(/'/g,"\\'")}')">
      <td title="${c}">${cname}</td>
      <td style="font-size:11px;color:var(--muted)">${fmtR(info.f)}</td>
      <td>${t10>0?`<span class="cnt r">${t10}</span>`:'-'}</td>
      <td>${t25>0?`<span class="cnt o">${t25}</span>`:'-'}</td>
      <td>${t50>0?`<span class="cnt g">${t50}</span>`:'-'}</td>
      <td>${t80>0?`<span class="cnt gr">${t80}</span>`:'-'}</td>
      <td>${add>0?`<span class="cnt done">${add}</span>`:'-'}</td>
      <td style="font-weight:700;color:${open>0?'var(--text)':'var(--muted)'}">${open}</td>
    </tr>`;
  });

  h += '</tbody></table></div>';
  document.getElementById('main').innerHTML = h;
}

function selectClient(c){
  curC = c;
  curFilter = 'all';
  document.getElementById('selC').value = c;
  document.getElementById('backBtn').classList.add('vis');
  document.getElementById('hdrTitle').textContent = '🎯 ' + c;
  document.getElementById('hdrSub').textContent = curV;
  renderCliente();
}

// ── CLIENT DETAIL ─────────────────────────────────────────────────────────────
function renderCliente(){
  const info = D[curV][curC];
  if(!info) return;
  const k = K(curV, curC);
  if(!state[k]) state[k]={};
  const st = state[k];
  const gaps = info.g;

  const total = gaps.length;
  const nAdd  = gaps.filter(g=>st[g.r]==='add').length;
  const nNa   = gaps.filter(g=>st[g.r]==='na').length;
  const nOpen = total-nAdd-nNa;
  const nCrit = gaps.filter(g=>g.r<=10&&!st[g.r]).length;
  const nAlta = gaps.filter(g=>g.r>10&&g.r<=25&&!st[g.r]).length;
  const pct   = total>0 ? Math.round((nAdd+nNa)/total*100) : 0;

  let filtered;
  if(curFilter==='top10')     filtered=gaps.filter(g=>g.r<=10);
  else if(curFilter==='top25') filtered=gaps.filter(g=>g.r<=25);
  else if(curFilter==='open')  filtered=gaps.filter(g=>!st[g.r]);
  else if(curFilter==='add')   filtered=gaps.filter(g=>st[g.r]==='add');
  else if(curFilter==='na')    filtered=gaps.filter(g=>st[g.r]==='na');
  else filtered=gaps;

  let h='';

  h+=`<div class="clichdr">
    <h2>${curC}</h2>
    <div class="climeta">
      <div class="mb">💰 Fat 6M <span>${fmtR(info.f)}</span></div>
      <div class="mb">📋 Total gaps <span>${total}</span></div>
      <div class="mb">⚡ Abertos <span>${nOpen}</span></div>
    </div>
  </div>`;

  h+=`<div class="pgwrap">
    <div class="pglbl"><span>Progresso</span><span>${nAdd+nNa} / ${total} tratados (${pct}%)</span></div>
    <div class="pgbar"><div class="pgfill" style="width:${pct}%"></div></div>
  </div>`;

  h+=`<div class="spills">
    <div class="sp r"><span class="n">${nCrit}</span><span class="l">Top 10</span></div>
    <div class="sp o"><span class="n">${nAlta}</span><span class="l">Top 25</span></div>
    <div class="sp g"><span class="n">${nAdd}</span><span class="l">Adicionados</span></div>
    <div class="sp"><span class="n">${nNa}</span><span class="l">N/A</span></div>
  </div>`;

  const tabDefs=[
    ['all',`Todos (${total})`],['open',`⚡ Abertos (${nOpen})`],
    ['top10',`🔴 Top 10`],['top25',`🟡 Top 25`],
    ['add',`✅ ADD (${nAdd})`],['na',`🚫 N/A (${nNa})`],
  ];
  h+='<div class="tabs">';
  tabDefs.forEach(([f,l])=>{
    h+=`<div class="tab${curFilter===f?' act':''}" onclick="setFilter('${f}')">${l}</div>`;
  });
  h+='</div>';

  h+=`<div class="leg"><div class="ltl">Prioridade</div><div class="litems">
    <div class="li"><div class="ld" style="background:var(--red)"></div>Top 10 — Crítico</div>
    <div class="li"><div class="ld" style="background:var(--gold)"></div>Top 11–25 — Alta</div>
    <div class="li"><div class="ld" style="background:var(--green)"></div>Top 26–50 — Média</div>
    <div class="li"><div class="ld" style="background:#bdc3c7"></div>Top 51–80 — Baixa</div>
  </div></div>`;

  h+=`<div class="stl">Itens (${filtered.length})</div>`;

  if(filtered.length===0){
    h+=`<div class="ph" style="padding:30px 0"><div class="ico">🎉</div><h3>Tudo certo!</h3><p>Nenhum item neste filtro.</p></div>`;
  } else {
    h+='<div class="glist">';
    filtered.forEach(g=>{
      const pc=pClass(g.r); const pl=pLabel(g.r);
      const isAdd=st[g.r]==='add'; const isNa=st[g.r]==='na';
      const ec=isAdd?' done-c':isNa?' na-c':'';
      h+=`<div class="gc ${pc}${ec}">
        <div class="rb">#${g.r}</div>
        <div class="gi">
          <div class="gn">${g.d}</div>
          <div class="gcat">${g.c}</div>
          <div class="gst">
            <div class="pill">${pl}</div>
            <div class="pill">Penetração <strong>${g.p}%</strong></div>
          </div>
        </div>
        <div class="abns">
          <button class="ab add${isAdd?' act':''}" onclick="act(${g.r},'add')">
            ${isAdd?'✓ ADD':'＋ ADD'}
          </button>
          <button class="ab na${isNa?' act':''}" onclick="act(${g.r},'na')">
            ${isNa?'✕ N/A':'🚫 N/A'}
          </button>
        </div>
      </div>`;
    });
    h+='</div>';
  }
  document.getElementById('main').innerHTML = h;
}

function act(rank, action){
  const k=K(curV,curC);
  if(!state[k]) state[k]={};
  state[k][rank] = state[k][rank]===action ? undefined : action;
  if(state[k][rank]===undefined) delete state[k][rank];
  save();
  const sy=window.scrollY;
  renderCliente();
  window.scrollTo(0,sy);
  updateSelOption();
  toast(action==='add'
    ? (state[k][rank]==='add'?'✅ Marcado como ADD':'Marcação removida')
    : (state[k][rank]==='na'?'🚫 Marcado como N/A':'Marcação removida'));
}

function updateSelOption(){
  const sel=document.getElementById('selC');
  const info=D[curV][curC];
  const st=state[K(curV,curC)]||{};
  const open=info.g.filter(g=>!st[g.r]).length;
  for(let o of sel.options){
    if(o.value===curC){
      const base=curC;
      o.textContent=base+' ('+open+')';
      break;
    }
  }
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('show'),2000);
}
</script>
